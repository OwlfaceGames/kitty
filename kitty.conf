# Import theme
include owly.conf

# Font configuration
font_size 23
font_family      family='Cascadia Code PL' variable_name=CascadiaCodePLRoman style=Regular
bold_font        family='Cascadia Code PL' variable_name=CascadiaCodePLRoman style=Bold
italic_font      family='Cascadia Code PL' variable_name=CascadiaCodePLRoman style=Italic
bold_italic_font family='Cascadia Code PL' variable_name=CascadiaCodePLRoman style='Bold Italic'

# Add slashed 0 stylistic set to font
font_features CascadiaCodePL-Regular +ss19
font_features CascadiaCodePL-Italic +ss19
font_features CascadiaCodePL-Bold +ss19
font_features CascadiaCodePL-BoldItalic +ss19

# Cursor configuration
cursor_shape block
shell_integration no-cursor
cursor_blink_interval 0

# Hide mouse when typing
mouse_hide_wait 1.0

# Remove window decorations
hide_window_decorations yes

# Disable audio bell
enable_audio_bell no

# Tab bar
tab_bar_style powerline
tab_bar_align left
tab_bar_edge bottom
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_min_tabs 2
tab_switch_strategy previous
tab_fade 0.25 0.5 0.75 1
tab_separator " ┇"

